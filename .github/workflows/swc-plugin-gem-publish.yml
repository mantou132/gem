name: Publish SWC Plugin Gem

on:
  workflow_dispatch:

jobs:
  swc-plugin-gem-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Check publish tool versions
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version

      - run: npm --prefix crates/swc-plugin-gem run prepublishOnly

      - uses: JS-DevTools/npm-publish@v4
        with:
          package: crates/swc-plugin-gem/package.json
