name: Publish Gem Context Server

on:
  workflow_dispatch:

jobs:
  context-server-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # docs https://pnpm.io/continuous-integration#github-actions

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - run: pnpm install

      - uses: JS-DevTools/npm-publish@v4
        with:
          package: packages/context-server/package.json
